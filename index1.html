<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaryav's Hangman game</title>
<link rel="shortcut icon" href="https://img.icons8.com/?size=100&id=Btd0TYPtg2iW&format=png&color=000000" type="image/x-icon">
<link rel="stylesheet" href="hangman.css">
</head>
<body>

<h1>Aaryav's HANGMAN game</h1>
<p class="subtitle">A classic word guessing game</p>

<div class="game-area">

  <!-- GALLOWS -->
  <div class="gallows-wrap">
    <svg id="gallows-svg" width="200" height="240" viewBox="0 0 200 240">
      <!-- Static gallows structure -->
      <line x1="20" y1="230" x2="180" y2="230" stroke="#5c3d1e" stroke-width="6" stroke-linecap="round"/>
      <line x1="60" y1="230" x2="60" y2="20" stroke="#5c3d1e" stroke-width="6" stroke-linecap="round"/>
      <line x1="60" y1="20" x2="140" y2="20" stroke="#5c3d1e" stroke-width="6" stroke-linecap="round"/>
      <line x1="140" y1="20" x2="140" y2="50" stroke="#8b6914" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="50" x2="100" y2="20" stroke="#5c3d1e" stroke-width="4" stroke-linecap="round"/>

      <!-- HANGMAN parts (revealed progressively) -->
      <circle id="h-head" cx="140" cy="65" r="16" stroke="#2c1810" stroke-width="3" fill="none" opacity="0"/>
      <line id="h-body" x1="140" y1="81" x2="140" y2="145" stroke="#2c1810" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="h-larm" x1="140" y1="100" x2="110" y2="125" stroke="#2c1810" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="h-rarm" x1="140" y1="100" x2="170" y2="125" stroke="#2c1810" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="h-lleg" x1="140" y1="145" x2="110" y2="185" stroke="#2c1810" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="h-rleg" x1="140" y1="145" x2="170" y2="185" stroke="#2c1810" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="h-leye"  x1="132" y1="58" x2="138" y2="64" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      <line id="h-leye2" x1="138" y1="58" x2="132" y2="64" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      <line id="h-reye"  x1="142" y1="58" x2="148" y2="64" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      <line id="h-reye2" x1="148" y1="58" x2="142" y2="64" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      <path id="h-mouth" d="M133 72 Q140 67 147 72" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0"/>
    </svg>

    <div class="lives-row">
      <span>Lives:</span>
      <div class="life-pip" id="pip0"></div>
      <div class="life-pip" id="pip1"></div>
      <div class="life-pip" id="pip2"></div>
      <div class="life-pip" id="pip3"></div>
      <div class="life-pip" id="pip4"></div>
      <div class="life-pip" id="pip5"></div>
      <div class="life-pip" id="pip6"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <div class="word-section">
      <div class="word-label">The Word</div>
      <div class="word-display" id="word-display"></div>
      <div class="hint-box" id="hint-box"></div>
    </div>

    <div class="wrong-section">
      <div class="wrong-label">Wrong Guesses</div>
      <div class="wrong-letters" id="wrong-letters"></div>
    </div>

    <div class="keyboard-section">
      <div class="keyboard-label">Keyboard — click or type</div>
      <div class="keyboard" id="keyboard"></div>
    </div>

    <div class="message" id="message"></div>
    <button class="new-game-btn" id="new-game-btn" onclick="newGame()">New Game</button>
    <button onclick="gotomenu()" class="new-game-btn">Return to main menu</button>
  </div>

</div>

<script>
  function gotomenu(){
    typesound();
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 200);
  }
</script>

<!-- words.js must load BEFORE index.js so pickWord() is available -->
<script src="words.js"></script>
<script src="index.js"></script>
</body>
</html>
